name: Release

on:
  push:
    tags:
      - "v*"

env:
  PROJECT_NAME: ts-metro
  VERSION: ${{ github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vue project
        run: npm run build

      - name: Package build
        run: |
          mkdir artifacts
          tar -czf artifacts/${PROJECT_NAME}-${VERSION}.tar.gz dist

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.PROJECT_NAME }}-${{ env.VERSION }}
          path: artifacts/${{ env.PROJECT_NAME }}-${{ env.VERSION }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PROJECT_NAME }}-${{ env.VERSION }}
          path: .

      - name: Create GitHub Release
        run: |
          gh release create ${{ env.VERSION }} \
            --repo ${{ github.repository }} \
            --title "${{ env.VERSION }}" \
            --generate-notes \
            ${{ env.PROJECT_NAME }}-${{ env.VERSION }}.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  attest:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PROJECT_NAME }}-${{ env.VERSION }}
          path: .

      - name: Generate attestation
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "${{ env.PROJECT_NAME }}-${{ env.VERSION }}.tar.gz"